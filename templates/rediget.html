{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            <h3 style="color: var(--dark-rose);" class="mb-4">Labot grāmatu</h3>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Grāmatas nosaukums</label>
                    <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Autors</label>
                    <div class="d-flex gap-2">
                        <select name="author_id" class="form-select" required>
                            {% for a in autori %}
                                <option value="{{ a.id }}" {% if a.id == book.author_id %}selected{% endif %}>
                                    {{ a.name }}
                                </option>
                            {% endfor %}
                        </select>
                        <a href="/pievienot_autoru" class="btn btn-outline-rose">+</a>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Izdošanas gads</label>
                    <input type="number" name="gads" class="form-control" value="{{ book.gads }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Žanrs</label>
                    <select name="zanrs_id" class="form-select">
                        {% for z in zanri %}
                            <option value="{{ z.id }}" {% if z.id == book.zanrs_id %}selected{% endif %}>
                                {{ z.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label font-weight-bold">Grāmatas vāks</label>
                    {% if book.bilde %}
                        <div class="mb-2">
                            <small class="text-muted d-block">Pašreizējā bilde:</small>
                            <img src="{{ url_for('static', filename='gramatas/' + book.bilde) }}" alt="Pašreizējā" style="height: 80px; border-radius: 5px;">
                        </div>
                    {% endif %}
                    <input type="file" name="bilde" class="form-control" accept="image/*">
                    <small class="text-muted">Atstāj tukšu, ja nevēlies mainīt esošo bildi.</small>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-rose w-100">Saglabāt izmaiņas</button>
                    <a href="/gramatas" class="btn btn-link w-100 mt-2 text-decoration-none" style="color: var(--medium-rose);">Atcelt</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
