<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bibliotēka{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: blue; font-weight: bold; }
        .grāmata { border: 1px solid #ccc; padding: 10px; margin: 10px 0; width: 200px; text-align: center; display: inline-block; }
        .grāmata img { max-width: 150px; height: auto; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">Sākums</a>
            <a href="/gramatas">Grāmatas</a>
            <a href="/par-mums">Par mums</a>
        </nav>
        <hr>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <hr>
        <p>&copy; 2024 Mana Bibliotēka</p>
    </footer>
</body>
</html>
